<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 540" width="820" height="540">
<!-- Terminal window -->
<rect width="820" height="540" rx="10" fill="#0d1117"/>
<rect width="820" height="36" rx="10" fill="#161b22"/>
<rect y="26" width="820" height="10" fill="#161b22"/>
<circle cx="20" cy="18" r="6" fill="#ff5f57"/>
<circle cx="40" cy="18" r="6" fill="#febc2e"/>
<circle cx="60" cy="18" r="6" fill="#28c840"/>
<text x="410" y="22" text-anchor="middle" fill="#8b949e" font-family="monospace" font-size="12">skill-anything — ~/projects</text>

<!-- Command 1 -->
<text y="68" x="20" fill="#3fb950" font-family="monospace" font-size="13">$</text>
<text y="68" x="36" fill="#e6edf3" font-family="monospace" font-size="13">sa auto</text>
<text y="68" x="100" fill="#a5d6ff" font-family="monospace" font-size="13">transformer.pdf</text>

<!-- Generation output -->
<text y="96" x="20" fill="#8b949e" font-family="monospace" font-size="13">&#x1F4C4; Source:</text>
<text y="96" x="116" fill="#ffa657" font-family="monospace" font-size="13">transformer.pdf</text>
<text y="96" x="270" fill="#484f58" font-family="monospace" font-size="13">(PDF, 15 pages)</text>

<text y="118" x="20" fill="#8b949e" font-family="monospace" font-size="13">&#x1F50D; Extracting text...</text>
<text y="118" x="226" fill="#3fb950" font-family="monospace" font-size="13">done</text>
<text y="118" x="268" fill="#484f58" font-family="monospace" font-size="13">(12,847 chars)</text>

<text y="140" x="20" fill="#8b949e" font-family="monospace" font-size="13">&#x1F9E0; Generating knowledge...</text>
<rect x="254" y="131" width="160" height="8" rx="4" fill="#21262d"/>
<rect x="254" y="131" width="160" height="8" rx="4" fill="#3fb950"/>
<text y="140" x="424" fill="#3fb950" font-family="monospace" font-size="13">done</text>

<text y="162" x="20" fill="#8b949e" font-family="monospace" font-size="13">&#x2753; Generating quiz...</text>
<text y="162" x="226" fill="#3fb950" font-family="monospace" font-size="13">32 questions</text>
<text y="162" x="358" fill="#484f58" font-family="monospace" font-size="13">(6 types, 3 levels)</text>

<text y="184" x="20" fill="#8b949e" font-family="monospace" font-size="13">&#x1F5C3; Generating flashcards...</text>
<text y="184" x="254" fill="#3fb950" font-family="monospace" font-size="13">45 cards</text>

<text y="206" x="20" fill="#8b949e" font-family="monospace" font-size="13">&#x1F4DD; Generating exercises...</text>
<text y="206" x="264" fill="#3fb950" font-family="monospace" font-size="13">8 tasks</text>

<!-- Output tree -->
<text y="236" x="20" fill="#3fb950" font-family="monospace" font-size="13">&#x2705; Output written:</text>

<text y="258" x="30" fill="#d2a8ff" font-family="monospace" font-size="13" font-weight="bold">output/</text>
<text y="276" x="50" fill="#79c0ff" font-family="monospace" font-size="13">&#x251C;&#x2500; transformer.yaml</text>
<text y="276" x="268" fill="#484f58" font-family="monospace" font-size="13">structured data (quiz/review/info)</text>
<text y="294" x="50" fill="#79c0ff" font-family="monospace" font-size="13">&#x251C;&#x2500; transformer.md</text>
<text y="294" x="268" fill="#484f58" font-family="monospace" font-size="13">12-section study guide</text>
<text y="312" x="50" fill="#79c0ff" font-family="monospace" font-size="13">&#x2514;&#x2500; transformer-concept-map.png</text>

<text y="340" x="20" fill="#3fb950" font-family="monospace" font-size="13">&#x2728; Done in 8.3s</text>

<!-- Separator -->
<line x1="20" y1="356" x2="800" y2="356" stroke="#21262d" stroke-width="1"/>

<!-- Command 2 -->
<text y="378" x="20" fill="#3fb950" font-family="monospace" font-size="13">$</text>
<text y="378" x="36" fill="#e6edf3" font-family="monospace" font-size="13">sa quiz</text>
<text y="378" x="104" fill="#a5d6ff" font-family="monospace" font-size="13">output/transformer.yaml</text>
<text y="378" x="296" fill="#d2a8ff" font-family="monospace" font-size="13">-d hard</text>

<!-- Quiz -->
<text y="406" x="20" fill="#d2a8ff" font-family="monospace" font-size="13">&#x2500;&#x2500;&#x2500; Q1/5 &#x2500;&#x2500;&#x2500;</text>
<text y="406" x="152" fill="#d29922" font-family="monospace" font-size="13" font-weight="bold">HARD</text>
<text y="406" x="202" fill="#484f58" font-family="monospace" font-size="13">(Scenario)</text>

<text y="430" x="20" fill="#e6edf3" font-family="monospace" font-size="13" font-weight="bold">You're building a search engine where queries are short</text>
<text y="448" x="20" fill="#e6edf3" font-family="monospace" font-size="13" font-weight="bold">but documents are very long. How would you adapt the</text>
<text y="466" x="20" fill="#e6edf3" font-family="monospace" font-size="13" font-weight="bold">Transformer attention mechanism for efficiency?</text>

<text y="492" x="20" fill="#39d353" font-family="monospace" font-size="13">Answer &#x25B8;</text>
<text y="492" x="100" fill="#e6edf3" font-family="monospace" font-size="13">Use cross-attention with chunked document processing...</text>

<text y="516" x="20" fill="#3fb950" font-family="monospace" font-size="13">&#x2714; Correct!</text>
<text y="516" x="120" fill="#484f58" font-family="monospace" font-size="13">Cross-attention with linear-complexity approximations</text>

<!-- Score box -->
<rect x="520" y="496" width="280" height="34" rx="8" fill="none" stroke="#3fb950" stroke-width="2"/>
<text y="518" x="536" fill="#ffa657" font-family="monospace" font-size="14" font-weight="bold">Score: 4/5 (80%)</text>
<text y="518" x="706" fill="#3fb950" font-family="monospace" font-size="15" font-weight="bold">Grade: A</text>
</svg>
