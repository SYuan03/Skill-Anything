<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" width="1200" height="520">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#11182d"/>
    </linearGradient>
    <linearGradient id="teal" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2dd4bf"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
    <linearGradient id="violet" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="amber" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#020617" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1200" height="520" rx="24" fill="url(#bg)"/>

  <text x="72" y="78" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="34" font-weight="800" fill="#f8fafc">
    Skill-Anything v0.2
  </text>
  <text x="72" y="112" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="18" fill="#94a3b8">
    Repo to skill toolchain: generate, import, validate, and re-export knowledge packs.
  </text>

  <g filter="url(#shadow)">
    <rect x="64" y="156" width="314" height="284" rx="22" fill="#0f172a" stroke="#1e293b"/>
    <text x="92" y="198" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="18" font-weight="700" fill="#e2e8f0">
      Inputs
    </text>
    <text x="92" y="224" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="14" fill="#64748b">
      New in v0.2: repos and existing skills join the pipeline
    </text>

    <rect x="92" y="254" width="118" height="44" rx="12" fill="rgba(45,212,191,0.10)" stroke="rgba(45,212,191,0.45)"/>
    <text x="151" y="281" text-anchor="middle" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="15" font-weight="700" fill="#5eead4">PDF / Video</text>

    <rect x="224" y="254" width="118" height="44" rx="12" fill="rgba(45,212,191,0.10)" stroke="rgba(45,212,191,0.45)"/>
    <text x="283" y="281" text-anchor="middle" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="15" font-weight="700" fill="#5eead4">Web / Audio</text>

    <rect x="92" y="314" width="118" height="44" rx="12" fill="rgba(45,212,191,0.10)" stroke="rgba(45,212,191,0.45)"/>
    <text x="151" y="341" text-anchor="middle" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="15" font-weight="700" fill="#5eead4">Text</text>

    <rect x="224" y="314" width="118" height="44" rx="12" fill="rgba(251,191,36,0.10)" stroke="rgba(251,191,36,0.45)"/>
    <text x="283" y="341" text-anchor="middle" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="15" font-weight="700" fill="#fcd34d">Repo</text>

    <rect x="92" y="374" width="250" height="44" rx="12" fill="rgba(167,139,250,0.10)" stroke="rgba(167,139,250,0.45)"/>
    <text x="217" y="401" text-anchor="middle" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="15" font-weight="700" fill="#c4b5fd">Existing SKILL.md Package</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="442" y="126" width="316" height="344" rx="24" fill="#111827" stroke="#243041"/>
    <text x="470" y="170" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="18" font-weight="700" fill="#e2e8f0">
      v0.2 Toolchain
    </text>

    <rect x="470" y="204" width="260" height="58" rx="16" fill="rgba(45,212,191,0.12)" stroke="rgba(45,212,191,0.55)"/>
    <text x="600" y="227" text-anchor="middle" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="15" font-weight="800" fill="#5eead4">sa repo</text>
    <text x="600" y="247" text-anchor="middle" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="13" fill="#cbd5e1">Docs-first scan for local repos and public GitHub repos</text>

    <rect x="470" y="284" width="260" height="58" rx="16" fill="rgba(167,139,250,0.12)" stroke="rgba(167,139,250,0.55)"/>
    <text x="600" y="307" text-anchor="middle" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="15" font-weight="800" fill="#c4b5fd">sa import-skill</text>
    <text x="600" y="327" text-anchor="middle" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="13" fill="#cbd5e1">Bring an existing SKILL.md package back into YAML and study format</text>

    <rect x="470" y="364" width="260" height="58" rx="16" fill="rgba(251,191,36,0.12)" stroke="rgba(251,191,36,0.55)"/>
    <text x="600" y="387" text-anchor="middle" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="15" font-weight="800" fill="#fcd34d">sa lint</text>
    <text x="600" y="407" text-anchor="middle" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="13" fill="#cbd5e1">Fail on blocking package and asset issues before sharing</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="822" y="156" width="314" height="284" rx="22" fill="#0f172a" stroke="#1e293b"/>
    <text x="850" y="198" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="18" font-weight="700" fill="#e2e8f0">
      Outputs
    </text>
    <text x="850" y="224" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="14" fill="#64748b">
      Same core pack, now easier to reuse and validate
    </text>

    <rect x="850" y="254" width="122" height="46" rx="12" fill="rgba(45,212,191,0.10)" stroke="rgba(45,212,191,0.45)"/>
    <text x="911" y="282" text-anchor="middle" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="15" font-weight="700" fill="#5eead4">Study Pack</text>

    <rect x="986" y="254" width="122" height="46" rx="12" fill="rgba(167,139,250,0.10)" stroke="rgba(167,139,250,0.45)"/>
    <text x="1047" y="282" text-anchor="middle" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="15" font-weight="700" fill="#c4b5fd">SKILL.md</text>

    <rect x="850" y="316" width="122" height="46" rx="12" fill="rgba(251,191,36,0.10)" stroke="rgba(251,191,36,0.45)"/>
    <text x="911" y="344" text-anchor="middle" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="15" font-weight="700" fill="#fcd34d">Quiz</text>

    <rect x="986" y="316" width="122" height="46" rx="12" fill="rgba(45,212,191,0.10)" stroke="rgba(45,212,191,0.45)"/>
    <text x="1047" y="344" text-anchor="middle" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="15" font-weight="700" fill="#5eead4">Flashcards</text>

    <rect x="850" y="378" width="258" height="40" rx="12" fill="rgba(148,163,184,0.08)" stroke="rgba(148,163,184,0.24)"/>
    <text x="979" y="403" text-anchor="middle" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="14" fill="#cbd5e1">
      Better onboarding, safer sharing, cleaner re-exporting
    </text>
  </g>

  <path d="M378 300 C408 300, 414 300, 442 300" fill="none" stroke="url(#amber)" stroke-width="4" stroke-linecap="round"/>
  <polygon points="434,292 454,300 434,308" fill="#fbbf24"/>

  <path d="M758 300 C788 300, 794 300, 822 300" fill="none" stroke="url(#violet)" stroke-width="4" stroke-linecap="round"/>
  <polygon points="814,292 834,300 814,308" fill="#a78bfa"/>

  <text x="600" y="492" text-anchor="middle" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="14" font-weight="500" fill="#64748b">
    v0.2 keeps the study-pack core, then adds import and validation around it.
  </text>
